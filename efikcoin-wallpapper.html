<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EfikCoin Eternal – Living Blockchain Wallpaper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevent selection on wallpaper */
        }

        body {
            overflow: hidden;
            font-family: 'Fira Code', 'Courier New', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060b);
            color: #0f0;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Animated blockchain grid */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Glowing orbs (nodes) */
        .node {
            position: absolute;
            background: radial-gradient(circle, #0f02, #0f00);
            border-radius: 50%;
            filter: blur(8px);
            pointer-events: none;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Main data panel */
        .dashboard {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            font-family: monospace;
            z-index: 10;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 15px;
        }

        .stat-card {
            background: #0a0f1aaa;
            padding: 10px 15px;
            border-radius: 12px;
            border-left: 3px solid #0f0;
            flex: 1;
            min-width: 150px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #8f8;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            word-break: break-word;
        }

        .quote {
            margin-top: 20px;
            text-align: center;
            font-style: italic;
            color: #cfc;
            border-top: 1px solid #0f03;
            padding-top: 15px;
            font-size: 0.9rem;
        }

        .founder {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid #0f0;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .developer-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: monospace;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(4px);
            border: 1px solid #0f0;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .stat-value { font-size: 1.2rem; }
            .stat-card { min-width: 120px; }
            .dashboard { padding: 12px; }
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div id="nodes-container"></div>
    <div class="founder">
        ⚡ Founder's Engine ⚡<br>
        EfikCoin Eternal | Decentralized Legacy
    </div>
    <div class="developer-panel" id="devConsoleBtn">
        🛠️ Dev Tools | Logs Active
    </div>
    <div class="dashboard">
        <div class="stats" id="statsPanel">
            <div class="stat-card">
                <div class="stat-label">ECE PRICE (USD)</div>
                <div class="stat-value" id="ecePrice">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">24H CHANGE</div>
                <div class="stat-value" id="priceChange">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">NETWORK</div>
                <div class="stat-value">BSC Mainnet</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">BLOCK HEIGHT (sim)</div>
                <div class="stat-value" id="blockHeight">--</div>
            </div>
        </div>
        <div class="quote" id="quoteText">
            "Coin is life. Life is for everyone."
        </div>
    </div>

    <script>
        // ========== CONFIG ==========
        const CONTRACT = "0x9F8C29E496ECB6C39c221458f211234DfCB233E0";
        const QUOTES = [
            "Coin is life. Life is for everyone.",
            "Built with blood, soul, and code.",
            "Decentralization is not a feature – it's a promise.",
            "EfikCoin Eternal: for generations to come.",
            "No third party. No shutdown. Only blockchain.",
            "The spirit of a builder never rests.",
            "From Nigeria to the world – financial freedom.",
            "Your keys, your coins, your legacy."
        ];
        let quoteIndex = 0;

        // Simulate block height (random growth)
        let simulatedBlock = 42000000;

        // Create floating nodes (blockchain visual)
        const nodesContainer = document.getElementById('nodes-container');
        const NODE_COUNT = 40;
        for (let i = 0; i < NODE_COUNT; i++) {
            const node = document.createElement('div');
            node.classList.add('node');
            const size = Math.random() * 30 + 10;
            node.style.width = size + 'px';
            node.style.height = size + 'px';
            node.style.left = Math.random() * 100 + '%';
            node.style.top = Math.random() * 100 + '%';
            node.style.animationDelay = Math.random() * 5 + 's';
            node.style.animationDuration = Math.random() * 6 + 3 + 's';
            nodesContainer.appendChild(node);
        }

        // Update live ECE price from DexScreener
        async function updateECEPrice() {
            try {
                const response = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${CONTRACT}`);
                const data = await response.json();
                if (data.pairs && data.pairs.length > 0) {
                    const pair = data.pairs[0];
                    const priceUsd = parseFloat(pair.priceUsd);
                    const change = pair.priceChange?.h24 ? parseFloat(pair.priceChange.h24).toFixed(2) : 0;
                    document.getElementById('ecePrice').innerText = `$${priceUsd.toFixed(8)}`;
                    document.getElementById('priceChange').innerHTML = `${change > 0 ? '+' : ''}${change}%`;
                    document.getElementById('priceChange').style.color = change >= 0 ? '#0f0' : '#f66';
                    console.log(`[Live] ECE Price: $${priceUsd}, 24h: ${change}%`);
                } else {
                    document.getElementById('ecePrice').innerText = '$0.00';
                    console.warn('No pair data');
                }
            } catch (err) {
                console.error('Price fetch error:', err);
                document.getElementById('ecePrice').innerText = '?';
            }
        }

        // Simulate block height increment
        function updateBlockHeight() {
            simulatedBlock += Math.floor(Math.random() * 3) + 1;
            document.getElementById('blockHeight').innerText = simulatedBlock.toLocaleString();
        }

        // Rotate quotes
        function rotateQuote() {
            quoteIndex = (quoteIndex + 1) % QUOTES.length;
            const quoteDiv = document.getElementById('quoteText');
            quoteDiv.style.opacity = '0';
            setTimeout(() => {
                quoteDiv.innerText = QUOTES[quoteIndex];
                quoteDiv.style.opacity = '1';
            }, 300);
        }
        setInterval(rotateQuote, 8000);

        // Initial load
        updateECEPrice();
        updateBlockHeight();
        setInterval(updateECEPrice, 30000);
        setInterval(updateBlockHeight, 15000);

        // Developer console button – show live logs in a toast
        const devBtn = document.getElementById('devConsoleBtn');
        devBtn.addEventListener('click', () => {
            alert("Developer Tools Active\n\nLive data is being fetched every 30 seconds.\nOpen browser console (F12) for detailed logs.\nYou can customize this wallpaper by editing the HTML.");
        });

        // Additional effect: mouse trail with glowing particles (optional, but cool)
        document.body.addEventListener('mousemove', (e) => {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = '4px';
            particle.style.height = '4px';
            particle.style.backgroundColor = '#0f0';
            particle.style.borderRadius = '50%';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '9999';
            particle.style.boxShadow = '0 0 8px #0f0';
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 400);
        });

        // Log that the wallpaper engine is running
        console.log("%cEfikCoin Eternal Wallpaper Engine – Mainnet Active", "color: #0f0; font-size: 16px; font-weight: bold;");
        console.log("%cFounder's Legacy: Decentralized for humanity.", "color: #afa;");
    </script>
</body>
      </html>
